services:
  postgres:
    image: postgres:17-alpine
    container_name: dbo-support-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbo-support-bot
    restart: unless-stopped
    networks:
      - default
      - proxy
    env_file:
      - .env
    environment:
      BOT_ID: ${BOT_ID}
      HTTP_PORT: 3000
      BOT_POLLING: ${BOT_POLLING:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.dbo-support-api.rule=Host(`api.yakubs.online`)
      - traefik.http.routers.dbo-support-api.entrypoints=websecure
      - traefik.http.routers.dbo-support-api.tls=true
      - traefik.http.routers.dbo-support-api.tls.certresolver=le
      - traefik.http.routers.dbo-support-api.service=dbo-support-api
      - traefik.http.services.dbo-support-api.loadbalancer.server.port=3000

      - traefik.http.routers.dbo-support-api-http.rule=Host(`api.yakubs.online`)
      - traefik.http.routers.dbo-support-api-http.entrypoints=web
      - traefik.http.routers.dbo-support-api-http.middlewares=dbo-support-redirect-to-https
      - traefik.http.routers.dbo-support-api-http.service=dbo-support-api
      - traefik.http.middlewares.dbo-support-redirect-to-https.redirectscheme.scheme=https
    depends_on:
      postgres:
        condition: service_healthy
networks:
  proxy:
    external: true
volumes:
  postgres_data:
